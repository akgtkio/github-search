<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub User Search</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #00ff88;
    --accent2: #ff3366;
    --text: #f0f0f0;
    --muted: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    margin-bottom: 48px;
    text-align: left;
  }

  .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .search-wrap {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 40px;
    transition: border-color 0.2s;
  }

  .search-wrap:focus-within { border-color: var(--accent); }

  .search-prefix {
    padding: 0 16px;
    display: flex;
    align-items: center;
    color: var(--accent);
    font-size: 14px;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 16px 20px;
  }

  input::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0 24px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  button:hover { background: #00ffaa; }
  button:active { transform: scale(0.97); }

  .status {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 1px;
    min-height: 20px;
  }

  .status.error { color: var(--accent2); }
  .status.loading { color: var(--accent); }

  .card {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 32px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    display: none;
  }

  .card.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 0;
    border: 2px solid var(--accent);
    filter: grayscale(30%);
  }

  .user-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }

  .user-info .login {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .bio {
    font-size: 12px;
    color: #999;
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 24px;
  }

  .stat {
    background: var(--surface);
    padding: 16px;
    text-align: center;
  }

  .stat-val {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  .meta span::before {
    content: '// ';
    color: var(--accent);
  }

  .gh-link {
    display: inline-block;
    margin-top: 24px;
    padding: 10px 20px;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }

  .gh-link:hover {
    background: var(--accent);
    color: #000;
  }

  .flow {
    margin-top: 48px;
    border: 1px solid var(--border);
    padding: 24px;
  }

  .flow-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .flow-steps {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 11px;
  }

  .flow-step {
    background: #1a1a1a;
    border: 1px solid var(--border);
    padding: 6px 12px;
    color: #ccc;
  }

  .flow-step.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .flow-arrow {
    color: var(--muted);
    font-size: 14px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    animation: blink 1s infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="label">// API Demo</div>
    <h1>GITHUB<br><span>SEARCH</span></h1>
    <p class="subtitle">GitHub Public API → APIキー不要 → 結果をここに表示<span class="cursor"></span></p>
  </header>

  <div class="search-wrap">
    <div class="search-prefix">github.com /</div>
    <input type="text" id="queryInput" placeholder="ユーザー名を入力（例: torvalds）" />
    <button onclick="searchUser()">SEARCH</button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" id="card">
    <div class="card-header">
      <img class="avatar" id="avatar" src="" alt="avatar" />
      <div class="user-info">
        <h2 id="name"></h2>
        <div class="login" id="login"></div>
      </div>
    </div>
    <p class="bio" id="bio"></p>
    <div class="stats">
      <div class="stat">
        <span class="stat-val" id="repos">-</span>
        <span class="stat-label">Repos</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="followers">-</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="following">-</span>
        <span class="stat-label">Following</span>
      </div>
    </div>
    <div class="meta">
      <span id="company"></span>
      <span id="location"></span>
      <span id="joined"></span>
    </div>
    <a class="gh-link" id="gh-link" href="#" target="_blank">→ GitHubで開く</a>
  </div>

  <div class="flow">
    <div class="flow-title">// APIリクエストの流れ</div>
    <div class="flow-steps">
      <div class="flow-step" id="f1">① このサイト</div>
      <div class="flow-arrow">→</div>
      <div class="flow-step" id="f2">② GETリクエスト送信</div>
      <div class="flow-arrow">→</div>
      <div class="flow-step" id="f3">③ GitHub API</div>
      <div class="flow-arrow">→</div>
      <div class="flow-step" id="f4">④ JSONで返ってくる</div>
      <div class="flow-arrow">→</div>
      <div class="flow-step" id="f5">⑤ ここに表示</div>
    </div>
  </div>

</div>

<script>
  const input = document.getElementById('queryInput');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') searchUser(); });

  function setFlow(step) {
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById('f' + i);
      el.classList.toggle('active', i <= step);
    }
  }

  async function searchUser() {
    const username = input.value.trim();
    if (!username) return;

    const status = document.getElementById('status');
    const card = document.getElementById('card');

    card.classList.remove('visible');
    status.className = 'status loading';
    status.textContent = '// リクエスト送信中...';
    setFlow(2);

    try {
      setFlow(3);

      const res = await fetch('https://api.github.com/users/' + encodeURIComponent(username));

      setFlow(4);

      if (res.status === 404) throw new Error('ユーザーが見つかりません');
      if (!res.ok) throw new Error('エラー: ' + res.status);

      const data = await res.json();

      document.getElementById('avatar').src = data.avatar_url;
      document.getElementById('name').textContent = data.name || data.login;
      document.getElementById('login').textContent = '@ ' + data.login;
      document.getElementById('bio').textContent = data.bio || '（自己紹介なし）';
      document.getElementById('repos').textContent = data.public_repos;
      document.getElementById('followers').textContent = data.followers;
      document.getElementById('following').textContent = data.following;
      document.getElementById('company').textContent = data.company || '';
      document.getElementById('location').textContent = data.location || '';
      document.getElementById('joined').textContent = '参加: ' + new Date(data.created_at).getFullYear() + '年';
      document.getElementById('gh-link').href = data.html_url;

      ['company', 'location'].forEach(function(id) {
        const el = document.getElementById(id);
        el.style.display = el.textContent ? '' : 'none';
      });

      status.className = 'status';
      status.textContent = '// レスポンス受信完了 ✓';
      setFlow(5);

      setTimeout(function() { card.classList.add('visible'); }, 50);

    } catch (err) {
      status.className = 'status error';
      status.textContent = '// ERROR: ' + err.message;
      setFlow(1);
    }
  }
</script>

</body>
</html>
